<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="90" fill="url(#logoGradient)" filter="url(#shadow)"/>
  
  <!-- Letter K stylized -->
  <g fill="#ffffff">
    <!-- Vertical bar of K -->
    <rect x="60" y="50" width="18" height="100" rx="3"/>
    
    <!-- Upper diagonal of K -->
    <path d="M 78 75 L 140 50 L 145 60 L 90 82 Z" />
    
    <!-- Lower diagonal of K -->
    <path d="M 90 95 L 145 140 L 140 150 L 78 100 Z" />
    
    <!-- Connection point (circle) -->
    <circle cx="84" cy="90" r="8"/>
  </g>
  
  <!-- Accent line (representing connection/network) -->
  <path d="M 130 85 Q 150 90 155 110" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
  <circle cx="155" cy="110" r="5" fill="#fbbf24" opacity="0.8"/>
</svg>
